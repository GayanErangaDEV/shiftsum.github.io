<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC 2048 Game</title>
    <link rel="icon" type="image/png" href="fav.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --panel-bg: #0d1527;
            --grid-bg: #131e36;
            --tile-empty: #1a2642;
            --accent-neon: linear-gradient(90deg, #9b306a, #d13b7d, #3b5998);
            --text-main: #e2e8f0;
            --cyber-pink: #d13b7d;
            --cyber-blue: #38bdf8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--accent-neon);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 360px;
            width: 100%;
        }

        .heading h1 {
            font-size: 34px;
            color: #ffffff;
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(209, 59, 125, 0.4);
            text-align: center;
        }

        .score-container {
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 8px;
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            display: inline-block;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .btn {
            background: #1b2a4a;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            margin: 4px 0;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover:not(:disabled) { 
            background: #253966;
            border-color: var(--cyber-pink);
            box-shadow: 0 0 10px rgba(209, 59, 125, 0.3);
        }

        .btn:disabled {
            background: #0f172a;
            color: #475569;
            cursor: not-allowed;
            border-color: transparent;
        }

        #submitScoreBtn {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            border: none;
        }

        #autoplayBtn {
            background: linear-gradient(90deg, #e11d48, #be123c);
            border: none;
            margin-bottom: 12px;
        }
        #autoplayBtn.active {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        /* 2048 Grid Matrix */
        .grid-container {
            width: 360px;
            height: 360px;
            background-color: var(--grid-bg);
            border-radius: 8px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .tile {
            background-color: var(--tile-empty);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Cyberpunk Tiles Styles */
        .tile-2    { background: #1e293b; color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); }
        .tile-4    { background: #334155; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.05); }
        .tile-8    { background: #1e3a8a; color: var(--cyber-blue); border: 1px solid #2563eb; }
        .tile-16   { background: #311042; color: #f472b6; border: 1px solid #701a75; }
        .tile-32   { background: #581c44; color: #f472b6; border: 1px solid #9d174d; }
        .tile-64   { background: #701a75; color: #fae8ff; border: 1px solid #d946ef; }
        .tile-128  { background: #4c0519; color: #fda4af; box-shadow: 0 0 15px rgba(225,29,72,0.4); border: 1px solid #be123c; }
        .tile-256  { background: #9d174d; color: #ffe4e6; box-shadow: 0 0 15px rgba(219,39,119,0.5); border: 1px solid #db2777; }
        .tile-512  { background: #be123c; color: #ffffff; box-shadow: 0 0 20px rgba(225,29,72,0.6); }
        .tile-1024 { background: #065f46; color: #34d399; box-shadow: 0 0 20px rgba(52,211,153,0.5); border: 1px solid #059669; }
        .tile-2048 { background: linear-gradient(135deg, #9b306a, #d13b7d); color: #ffffff; border: 1px solid #ff79b4; animation: glow 1s infinite alternate; }

        @keyframes glow { 0% { box-shadow: 0 0 15px #9b306a; } 100% { box-shadow: 0 0 30px #d13b7d; } }

        .overlay {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(6px);
            z-index: 10;
        }
        .overlay-gameover { background: rgba(10, 14, 23, 0.9); color: #f1f5f9; }
        .overlay-win      { background: rgba(155, 48, 106, 0.9); color: white; }
        .overlay-gate     { background: rgba(10, 14, 23, 0.85); color: #94a3b8; font-size: 16px; border: 1px dashed rgba(209, 59, 125, 0.3); text-align: center; padding: 20px; }

        /* Leaderboard */
        .leaderboard-panel {
            width: 100%;
            background: var(--panel-bg);
            border-radius: 10px;
            border-top: 3px solid var(--cyber-pink);
            padding: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .leaderboard-panel h2 {
            margin: 0 0 12px 0;
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(209, 59, 125, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .leaderboard-table th {
            text-align: left;
            color: #475569;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-transform: uppercase;
            font-size: 10px;
        }

        .leaderboard-table td {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            color: #cbd5e1;
        }

        .rank-badge {
            background: rgba(255,255,255,0.05);
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Wallet Panel */
        #blockchain-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        #web3-status { font-size: 12px; color: #94a3b8; margin: 4px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 5px; }
        #onchain-high { font-size: 13px; color: var(--cyber-blue); font-weight: bold; margin: 4px; }

        #connectBtn {
            background: linear-gradient(135deg, #9b306a, #d13b7d);
            border: none;
            margin: 0 0 10px 0;
        }
        #connectBtn.connected { background: #059669; }

        .pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #a7f3d0;
            margin-right: 5px;
        }

        #chain-badge {
            display: none;
            background: #064e3b;
            color: #34d399;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            margin: 6px auto 0;
            width: fit-content;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="heading">
            <h1>Arc 2048 <span style="color:var(--cyber-pink)">Game</span></h1>
        </div>

        <div class="score-container">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
        
        <button class="btn" id="autoplayBtn" onclick="toggleAutoplay()" disabled>🔒 Auto-Play (1 USDC)</button>
        <button class="btn" id="submitScoreBtn" onclick="manualUploadClick()" disabled>⚡ Submit Score to Arc</button>
        <button class="btn" id="newGameBtn" onclick="handleNewGameClick()" disabled>New Game</button>

        <div class="grid-container" id="grid"></div>

        <div class="leaderboard-panel">
            <h2>🏆 Live Leaderboard <span class="refresh-indicator" id="sync-time">On-Chain Live</span></h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Rank</th>
                        <th style="width: 55%;">Player Node</th>
                        <th style="width: 25%; text-align: right;">Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="3" style="text-align:center; color:#475569; padding: 15px 0;">Pipeline disconnected. Login via MetaMask.</td></tr>
                </tbody>
            </table>
        </div>

        <div id="blockchain-panel">
            <button class="btn" id="connectBtn" onclick="connectWallet()">Connect MetaMask</button>
            <div id="chain-badge"><span class="pulse-dot"></span> Arc Testnet</div>
            <p id="web3-status">Sync pipeline offline</p>
            <p id="onchain-high">On-Chain High: --</p>
        </div>

    </div>

    <script>
        // ─── CONFIGURATION ───────────────────────────────────────────────────
        // ඔයා ලියපු අලුත්ම Smart Contract Address එක සාර්ථකව සම්බන්ධ කරන ලදී
        const contractAddress = "0xd48E7080A28555725342855b5744c0751ae3346E"; 
        const autoplayFeeInUsdc = "1.0"; 

        try { ethers.logging = "off"; } catch(e) {}

        let board = Array(16).fill(0);
        let score = 0;
        let best  = parseInt(localStorage.getItem('arc2048best')) || 0;
        let gameOver = false;
        let won      = false;
        let scoreSubmittedThisSession = false;
        let isWalletConnected = false; 
        
        let autoplayInterval = null;
        let autoplayMoves = ['down', 'right', 'up', 'left'];
        let autoplayIndex = 0;

        document.getElementById('best').innerText = best;

        function flushConsolePipeline() {
            if (typeof console !== 'undefined' && console.clear) console.clear();
        }

        function initGame() {
            stopAutoplay();
            flushConsolePipeline();
            board    = Array(16).fill(0);
            score    = 0;
            gameOver = false;
            won      = false;
            scoreSubmittedThisSession = false;
            document.getElementById('score').innerText = score;
            addRandomTile();
            addRandomTile();
            renderBoard();
            updateSubmitButtonState();
        }

        async function handleNewGameClick() {
            if (!isWalletConnected) return;
            if (score > 0 && !gameOver && !won && !scoreSubmittedThisSession) {
                let confirmReset = confirm("Submit current score " + score + " to blockchain before starting a new game?");
                if (confirmReset && contract) {
                    await uploadScore(score);
                }
            }
            initGame();
        }

        async function manualUploadClick() {
            if (score === 0 || !isWalletConnected) return;
            stopAutoplay();
            await uploadScore(score);
        }

        // AUTO-PLAY CONTROLLER SENT TO CONTRACT ADDRESS
        async function toggleAutoplay() {
            if (!isWalletConnected) return;

            if (autoplayInterval) {
                stopAutoplay();
            } else {
                document.getElementById('web3-status').innerText = `Sending 1 USDC to Contract...`;
                
                try {
                    // සල්ලි කෙලින්ම යන්නේ ඔයාගේ Smart Contract Address එකටයි
                    const txPayload = {
                        to: contractAddress,
                        value: ethers.parseUnits(autoplayFeeInUsdc, 6) 
                    };
                    
                    const txResponse = await signer.sendTransaction(txPayload);
                    document.getElementById('web3-status').innerText = "Verifying Premium Pass...";
                    await txResponse.wait(); 
                    document.getElementById('web3-status').innerText = "Premium Pass Active! 🤖";
                } catch (txError) {
                    document.getElementById('web3-status').innerText = "Payment cancelled/failed.";
                    alert(`You must complete the ${autoplayFeeInUsdc} USDC contract payment to unlock Auto-Play!`);
                    return;
                }

                if (gameOver || won) initGame();
                document.getElementById('autoplayBtn').innerText = "🛑 Stop Auto-Play";
                document.getElementById('autoplayBtn').classList.add('active');
                
                autoplayInterval = setInterval(() => {
                    if (gameOver || won) {
                        stopAutoplay();
                        return;
                    }
                    flushConsolePipeline();
                    let nextMove = autoplayMoves[autoplayIndex];
                    move(nextMove);
                    autoplayIndex = (autoplayIndex + 1) % autoplayMoves.length;
                }, 150); 
            }
        }

        function stopAutoplay() {
            if (autoplayInterval) {
                clearInterval(autoplayInterval);
                autoplayInterval = null;
            }
            if (isWalletConnected) {
                document.getElementById('autoplayBtn').innerText = `🤖 Start Auto-Play (${autoplayFeeInUsdc} USDC)`;
            }
            document.getElementById('autoplayBtn').classList.remove('active');
        }

        function updateSubmitButtonState() {
            const btn = document.getElementById('submitScoreBtn');
            if (contract && score > 0 && !scoreSubmittedThisSession && isWalletConnected) {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        function renderBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            if (!isWalletConnected) {
                const gate = document.createElement('div');
                gate.className = 'overlay overlay-gate';
                gate.innerHTML = '<div>🔒 ACCESS DENIED<br><span style="font-size:12px;color:var(--cyber-pink)">Connect your MetaMask wallet to unlock the grid interface.</span></div>';
                grid.appendChild(gate);
                return;
            }

            board.forEach((value) => {
                const tile = document.createElement('div');
                const capped = Math.min(value, 2048);
                tile.className = 'tile' + (value > 0 ? ' tile-' + capped : '');
                tile.innerText = value > 0 ? value : '';
                grid.appendChild(tile);
            });

            if (won) {
                const ov = document.createElement('div');
                ov.className = 'overlay overlay-win';
                ov.innerHTML = '<div>CORE HIT: 2048</div>';
                grid.appendChild(ov);
                stopAutoplay();
                triggerAutoPopup();
            } else if (gameOver) {
                const ov = document.createElement('div');
                ov.className = 'overlay overlay-gameover';
                ov.innerHTML = '<div>GAME OVER</div>';
                grid.appendChild(ov);
                stopAutoplay();
                triggerAutoPopup();
            }
        }

        async function triggerAutoPopup() {
            if (contract && score > 0 && !scoreSubmittedThisSession) {
                await uploadScore(score);
            }
        }

        function addRandomTile() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length > 0) board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
        }

        function slide(arr) {
            let a = arr.filter(v => v);
            for (let i = 0; i < a.length - 1; i++) {
                if (a[i] === a[i + 1]) {
                    a[i] *= 2;
                    score += a[i];
                    a.splice(i + 1, 1);
                }
            }
            while (a.length < 4) a.push(0);
            return a;
        }

        function move(dir) {
            if (gameOver || won || !isWalletConnected) return;
            const prev = JSON.stringify(board);

            if (dir === 'left' || dir === 'right') {
                for (let i = 0; i < 16; i += 4) {
                    let row = board.slice(i, i + 4);
                    if (dir === 'right') row.reverse();
                    row = slide(row);
                    if (dir === 'right') row.reverse();
                    for (let j = 0; j < 4; j++) board[i + j] = row[j];
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = [board[c], board[c+4], board[c+8], board[c+12]];
                    if (dir === 'down') col.reverse();
                    col = slide(col);
                    if (dir === 'down') col.reverse();
                    for (let j = 0; j < 4; j++) board[c + j*4] = col[j];
                }
            }

            if (JSON.stringify(board) !== prev) {
                flushConsolePipeline();
                addRandomTile();
                document.getElementById('score').innerText = score;
                updateSubmitButtonState();
                
                if (score > best) {
                    best = score;
                    document.getElementById('best').innerText = best;
                    localStorage.setItem('arc2048best', best);
                }
                checkEnd();
                renderBoard();
            }
        }

        function checkEnd() {
            if (board.includes(2048) && !won) { won = true; return; }
            if (board.includes(0)) return;
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    let v = board[r*4 + c];
                    if (c < 3 && v === board[r*4 + c + 1]) return;
                    if (r < 3 && v === board[(r+1)*4 + c]) return;
                }
            }
            gameOver = true;
        }

        window.addEventListener('keydown', e => {
            const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
            if (map[e.key]) { 
                e.preventDefault(); 
                if(!isWalletConnected) return;
                stopAutoplay(); 
                move(map[e.key]); 
            }
        });

        // ─── WEB3 ETHERS CONFIG ──────────────────────────────────────────────
        let provider, signer, contract;
        
        const contractABI = [
            "function submitScore(uint256 _score) public",
            "function getHighScore(address _player) public view returns (uint256)",
            "function getTopScores() public view returns (address[] memory players, uint256[] memory scores)"
        ];

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') { 
                alert('MetaMask extension not found.'); 
                return; 
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.BrowserProvider(window.ethereum);
                signer   = await provider.getSigner();
                
                try {
                    await window.ethereum.request({ 
                        method: 'wallet_switchEthereumChain', 
                        params: [{ chainId: '0x4cef52' }] 
                    });
                } catch (switchErr) {
                    if (switchErr.code === 4902) {
                        try {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: '0x4cef52',
                                    chainName: 'Arc Testnet',
                                    nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 6 },
                                    rpcUrls: ['https://arc-testnet.drpc.org'], 
                                    blockExplorerUrls: ['https://testnet.arcscan.app']
                                }]
                            });
                        } catch (addError) { }
                    }
                }

                contract = new ethers.Contract(contractAddress, contractABI, signer);
                
                isWalletConnected = true;
                document.getElementById('connectBtn').className = 'btn connected';
                document.getElementById('connectBtn').innerText = 'Connected';
                document.getElementById('chain-badge').style.display = 'block';
                document.getElementById('web3-status').innerText = 'Node: ' + accounts[0].substring(0,6) + '...' + accounts[0].substring(36);
                
                document.getElementById('autoplayBtn').disabled = false;
                document.getElementById('autoplayBtn').innerText = `🤖 Start Auto-Play (${autoplayFeeInUsdc} USDC)`;
                document.getElementById('newGameBtn').disabled = false;

                initGame(); 
                fetchRealLeaderboard(accounts[0]);
                
            } catch (err) { 
                document.getElementById('web3-status').innerText = 'Connection rejected.';
                isWalletConnected = false;
                renderBoard();
            }
        }

        async function fetchRealLeaderboard(playerAddr) {
            const lbBody = document.getElementById('leaderboard-body');
            if (!contract) return;
            try {
                const hs = await contract.getHighScore(playerAddr);
                document.getElementById('onchain-high').innerText = 'On-Chain High: ' + hs.toString();
                lbBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8;">Syncing on-chain logs...</td></tr>';
                
                const [players, scores] = await contract.getTopScores();
                if (players.length === 0) {
                    lbBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#475569; padding: 15px 0;">No active records found.</td></tr>';
                    return;
                }

                lbBody.innerHTML = '';
                for (let i = 0; i < players.length; i++) {
                    let row = document.createElement('tr');
                    let rankStyle = (i === 0) ? 'style="color:#f59e0b;"' : '';
                    let scoreStyle = (i === 0) ? 'style="text-align:right; font-weight:bold; color:var(--cyber-blue);"' : 'style="text-align:right;"';
                    let shortAddr = players[i].substring(0, 8) + '...' + players[i].substring(36);
                    let userTag = (players[i].toLowerCase() === playerAddr.toLowerCase()) ? '<span style="color:var(--cyber-pink); font-size:11px;">(You)</span>' : '';
                    
                    row.innerHTML = `
                        <td><span class="rank-badge" ${rankStyle}>${i + 1}</span></td>
                        <td>${shortAddr} ${userTag}</td>
                        <td ${scoreStyle}>${scores[i].toString()}</td>
                    `;
                    lbBody.appendChild(row);
                }
                document.getElementById('sync-time').innerText = 'Synced';
                flushConsolePipeline(); 
            } catch (error) {
                lbBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ef4444; padding: 10px 0;">Live array lookup error.</td></tr>`;
            }
        }

        async function uploadScore(targetScore) {
            if (!contract || targetScore === 0 || scoreSubmittedThisSession || !isWalletConnected) return;
            try {
                document.getElementById('web3-status').innerText = 'Sign request pending...';
                const tx = await contract.submitScore(targetScore);
                document.getElementById('web3-status').innerText = 'Mining Block...';
                await tx.wait();
                
                document.getElementById('web3-status').innerText = 'Score Logged!';
                scoreSubmittedThisSession = true;
                updateSubmitButtonState();
                
                const activeAcc = await signer.getAddress();
                fetchRealLeaderboard(activeAcc);
            } catch (err) {
                document.getElementById('web3-status').innerText = 'Sync rejected or gas error.';
            }
        }

        renderBoard();
    </script>
</body>
</html>
